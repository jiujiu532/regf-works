server:
  port: 8080

auth:
  username: "admin"
  password: "admin123"
  jwt_secret: "change-me-in-production"

proxy:
  default: ""
  pool: []

mail:
  provider_priority: "ahem,yydsmail"
  yydsmail:
    base_url: ""
    api_key: ""
  ahem:
    # AHEM 临时邮箱服务地址（如 https://mail.example.com）
    # 基于 https://github.com/o4oren/Ad-Hoc-Email-Server 搭建
    # 无需认证，任意前缀@域名即可收信
    base_url: ""
    # 可用域名列表（逗号分隔）。留空则自动从 /api/properties 获取
    domains: ""
  gptmail:
    # GPTMail 服务地址（默认 https://mail.chatgpt.org.uk）
    base_url: ""
    # GPTMail API Key（可从服务商获取）
    api_key: ""
  moemail:
    # MoeMail 自建邮箱服务地址（需自行部署）
    # API 文档: https://docs.moemail.app/api.html
    base_url: ""
    # MoeMail API Key（必需，从个人中心创建）
    api_key: ""
    # 可用域名列表（逗号分隔）。留空则自动从 /api/config 获取
    domains: ""
    # 邮箱有效期（毫秒），默认 3600000 (1小时)
    # 可选值：3600000（1小时）、86400000（1天）、604800000（7天）、0（永久）
    expiry_time: 3600000

turnstile:
  solver_urls:
    - "http://127.0.0.1:5072"
  solver_proxy: ""
  capsolver_key: ""
  yescaptcha_key: ""

grok:
  site_key: "0x4AAAAAAAhr9JGVDZbrZOo0"
  action_id: ""
  state_tree: ""
  cf_bypass_solver_url: ""

fireworks:
  service_url: "http://127.0.0.1:5000"
  max_concurrent: 10

openrouter:
  service_url: "http://127.0.0.1:5001"
  max_concurrent: 10
  solver_type: "selfhost"           # selfhost 或 yescaptcha
  solver_api: "http://localhost:5072"
  yescaptcha_key: ""                # YesCaptcha API Key（可选）

novita:
  service_url: "http://127.0.0.1:5002"
  max_concurrent: 5
  solver_api: "http://127.0.0.1:5072"
