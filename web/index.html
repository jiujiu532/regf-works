<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>regf-works | 自动化注册平台</title>
  <style>
    /* CSS 重置 & 变量 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-main: #0a0a14;
      --bg-card: #1a1a2e;
      --bg-sidebar: #0d0d1a;
      --bg-input: #12121f;
      --border-color: #2a2a42;
      --border-focus: #6366f1;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --success: #10b981;
      --error: #f43f5e;
      --warning: #f59e0b;
      --radius-lg: 10px;
      --radius-md: 6px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #33334d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444466; }

    /* 通用组件 */
    input, textarea, select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: #fff;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--primary-gradient);
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.5);
    }
    .btn-danger {
      background: var(--error);
      box-shadow: 0 2px 10px rgba(244, 63, 94, 0.25);
    }
    .btn-danger:hover:not(:disabled) {
      background: #e11d48;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #27273a;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    .btn-secondary:hover:not(:disabled) {
      background: #32324c;
    }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; }

    /* Login 页面 */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1a103c 0%, var(--bg-main) 60%);
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      width: 380px;
      box-shadow: var(--shadow-lg);
    }
    .login-card h1 {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 28px;
    }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 500;
    }

    /* Layout */
    .layout-app { display: none; height: 100vh; flex-direction: column; }
    .layout-header {
      height: 64px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .header-logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-user { display: flex; align-items: center; gap: 16px; }
    .header-user span { font-size: 0.85rem; color: var(--text-muted); }

    .layout-body { display: flex; flex: 1; overflow: hidden; }
    .layout-sidebar {
      width: 240px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
    }
    .nav-link:hover { color: var(--text-main); background: #161630; }
    .nav-link.active {
      color: var(--white);
      background: #181838;
      border-left-color: var(--primary);
    }

    .layout-content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.05) 0%, #0d0d1f 50%);
    }
    .layout-content { flex: 1; overflow-y: auto; padding: 20px; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s ease;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .stat-icon.success { background: rgba(16, 185, 129, 0.15); }
    .stat-icon.error { background: rgba(244, 63, 94, 0.15); }
    .stat-icon.total { background: rgba(99, 102, 241, 0.15); }
    .stat-icon.rate { background: rgba(245, 158, 11, 0.15); }
    .stat-content h4 {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .stat-content .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1;
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
    }
    .card:hover {
      box-shadow: var(--shadow-lg);
    }
    .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; }
    .tab {
      padding: 10px 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      background: transparent;
    }
    .tab:hover { color: var(--text-main); }
    .tab.active { 
      color: var(--primary); 
      border-bottom-color: var(--primary);
      background: rgba(99, 102, 241, 0.08);
    }

    /* Log Window */
    .log-panel {
      height: 240px;
      background: #05050f;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .log-panel.collapsed { height: 40px; }
    .log-header {
      height: 40px;
      background: #08081a;
      border-bottom: 1px solid #16162d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      cursor: pointer;
      user-select: none;
    }
    .log-header span { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .log-controls { display: flex; gap: 12px; }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.8;
      color: #cbd5e1;
    }
    .log-line { margin-bottom: 4px; white-space: pre-wrap; word-break: break-all; }
    .log-success { color: var(--success); }
    .log-error { color: var(--error); }
    .log-info { color: var(--primary); }
    .log-warn { color: var(--warning); }
    .log-ok { color: #22c55e; font-weight: bold; }

    /* Results Table */
    .table-container { overflow-x: auto; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
    .table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
    .table th { background: #111126; padding: 10px 12px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-color); white-space: nowrap; }
    .table td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); }
    .table tbody tr:hover { background: #161632; }
    .table tbody tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-grok { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
    .badge-fireworks { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .badge-failed { background: rgba(244, 63, 94, 0.15); color: var(--error); }

    .cell-cred {
      max-width: 180px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell-email {
      font-weight: 500;
      color: var(--text-main);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; justify-content: space-between; }
    .toolbar-left { display: flex; gap: 12px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      width: 600px;
      max-width: 90%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
    .modal-body {
      padding: 32px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      background: #090918;
      border-bottom: 1px solid var(--border-color);
    }
    .modal-body pre { white-space: pre-wrap; word-break: break-all; color: #a5b4fc; }
    .modal-footer { padding: 16px 24px; display: flex; justify-content: flex-end; gap: 12px; }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: #1e1b4b;
      border: 1px solid var(--border-focus);
      color: #fff;
      padding: 16px 24px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 0.9rem;
      min-width: 240px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toast.show { transform: translateX(0); }
    .toast-success { border-color: var(--success); }
    .toast-error { border-color: var(--error); }

    /* Forms */
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }

    /* Search Box */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-box input {
      padding-left: 36px;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Collapsible Sections */
    .section-header {
      padding: 16px 24px;
      background: #181832;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
    }
    .section-header:hover { background: #1f1f42; }
    .section-header h3 { font-size: 1rem; display: flex; align-items: center; gap: 10px; }
    .section-body {
      padding: 32px;
      background: #111124;
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      margin-top: -12px;
      margin-bottom: 16px;
      display: none;
    }
    .section-body.show { display: block; }
    .arrow-icon { transition: transform 0.2s ease; }
    .section-header.active .arrow-icon { transform: rotate(90deg); }

    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }

    /* Responsive */
    @media (max-width: 768px) {
      .layout-body { flex-direction: column; }
      .layout-sidebar {
        width: 100%;
        height: 60px;
        flex-direction: row;
        padding: 0;
        justify-content: space-around;
        border-right: none;
        border-top: 1px solid var(--border-color);
        order: 2;
      }
      .nav-link { border-left: none; border-top: 4px solid transparent; padding: 12px; width: 100%; justify-content: center; }
      .nav-link.active { border-top-color: var(--primary); }
      .layout-content-wrap { order: 1; }
      .log-panel { height: 160px; }
    }
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Login Page -->
  <div id="loginPage" class="login-container">
    <div class="login-card">
      <h1>regf-works</h1>
      <div class="login-subtitle">自动化注册与服务控制台</div>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="输入用户名">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="输入密码">
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">登录系统</button>
    </div>
  </div>

  <!-- App Layout -->
  <div id="appLayout" class="layout-app">
    <header class="layout-header">
      <div class="header-logo">regf-works</div>
      <div class="header-user">
        <span id="displayUsername">admin</span>
        <button class="btn btn-secondary btn-sm" onclick="handleLogout()">退出</button>
      </div>
    </header>

    <div class="layout-body">
      <aside class="layout-sidebar">
        <div class="nav-link active" data-panel="register" onclick="switchPanel('register')">📝 账号注册</div>
        <div class="nav-link" data-panel="results" onclick="switchPanel('results')">📋 注册结果</div>
        <div class="nav-link" data-panel="settings" onclick="switchPanel('settings')">⚙️ 系统设置</div>
      </aside>

      <div class="layout-content-wrap">
        <main class="layout-content">

          <!-- 1. 注册面板 -->
          <div id="panel-register" class="panel active">
            <div class="tabs">
              <div class="tab active" data-tab="grok" onclick="switchTab('grok')">Grok</div>
              <div class="tab" data-tab="fireworks" onclick="switchTab('fireworks')">Fireworks</div>
            </div>

            <!-- Grok 注册表单 -->
            <div id="tab-grok" class="tab-content">
              <div class="card">
                <h2>Grok 自动化注册</h2>
                <div class="form-row">
                  <div class="form-group">
                    <label>代理设置 (可选)</label>
                    <input type="text" id="grokProxy" placeholder="http://user:pass@host:port">
                  </div>
                  <div class="form-group">
                    <label>并发数量</label>
                    <input type="number" id="grokCount" value="1" min="1" max="100">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>指定邮箱 Provider (可选)</label>
                    <select id="grokMailProvider">
                      <option value="">默认优先</option>
                      <option value="ahem">AHEM 临时邮箱</option>
                      <option value="yydsmail">YYDS Mail</option>
                    </select>
                  </div>
                </div>
                <div class="reg-actions">
                  <button class="btn btn-primary" id="btn-grok-start" onclick="startRegistration('grok')">开始批量注册</button>
                  <button class="btn btn-danger" id="btn-grok-stop" style="display:none;" onclick="stopRegistration('grok')">停止任务</button>
                </div>
              </div>
            </div>

            <!-- Fireworks 注册表单 -->
            <div id="tab-fireworks" class="tab-content" style="display:none;">
              <div class="card">
                <h2>Fireworks 自动化注册</h2>
                <div class="form-row">
                  <div class="form-group">
                    <label>代理设置 (可选)</label>
                    <input type="text" id="fireworksProxy" placeholder="http://user:pass@host:port">
                  </div>
                  <div class="form-group">
                    <label>并发数量</label>
                    <input type="number" id="fireworksCount" value="1" min="1" max="100">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>指定邮箱 Provider (可选)</label>
                    <select id="fireworksMailProvider">
                      <option value="">默认优先</option>
                      <option value="ahem">AHEM 临时邮箱</option>
                      <option value="yydsmail">YYDS Mail</option>
                    </select>
                  </div>
                </div>
                <div class="reg-actions">
                  <button class="btn btn-primary" id="btn-fireworks-start" onclick="startRegistration('fireworks')">开始批量注册</button>
                  <button class="btn btn-danger" id="btn-fireworks-stop" style="display:none;" onclick="stopRegistration('fireworks')">停止任务</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 2. 结果面板 -->
          <div id="panel-results" class="panel">
            <!-- 统计卡片 -->
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon total">📊</div>
                <div class="stat-content">
                  <h4>总注册数</h4>
                  <div class="stat-value" id="stat-total">0</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon success">✓</div>
                <div class="stat-content">
                  <h4>成功</h4>
                  <div class="stat-value" id="stat-success">0</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon error">✗</div>
                <div class="stat-content">
                  <h4>失败</h4>
                  <div class="stat-value" id="stat-failed">0</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon rate">📈</div>
                <div class="stat-content">
                  <h4>成功率</h4>
                  <div class="stat-value" id="stat-rate">0%</div>
                </div>
              </div>
            </div>

            <div class="card" style="margin-bottom: 0;">
              <h2>注册结果库</h2>
              <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索邮箱、密码或 API key..." oninput="renderResults()">
              </div>
              <div class="toolbar">
                <div class="toolbar-left">
                  <select id="filterPlatform" onchange="renderResults()" style="width:140px;">
                    <option value="all">所有平台</option>
                    <option value="grok">Grok</option>
                    <option value="fireworks">Fireworks</option>
                  </select>
                  <select id="filterStatus" onchange="renderResults()" style="width:120px;">
                    <option value="all">所有状态</option>
                    <option value="success">成功</option>
                    <option value="failed">失败</option>
                  </select>
                  <button class="btn btn-secondary btn-sm" onclick="exportResults()">导出 JSON</button>
                  <button class="btn btn-secondary btn-sm" onclick="exportResultsTxt()">导出 TXT</button>
                  <button class="btn btn-secondary btn-sm" onclick="copyAllFormatted()">复制全部</button>
                </div>
                <button class="btn btn-danger btn-sm" onclick="clearResults()">清空结果</button>
              </div>

              <div id="resultsTableContainer">
                <!-- 动态表格 -->
              </div>
            </div>
          </div>

          <!-- 3. 设置面板 -->
          <div id="panel-settings" class="panel">
            <!-- 邮箱设置 -->
            <div class="section-header" onclick="toggleSection('set-mail')">
              <h3><span>📬</span> 邮箱服务配置</h3>
              <span class="arrow-icon">▶</span>
            </div>
            <div id="set-mail" class="section-body">
              <div class="form-group">
                <label>优先级 (逗号分隔)</label>
                <input type="text" id="setMailPriority" placeholder="ahem,yydsmail">
              </div>
              <div class="form-row">
                <div style="border: 1px solid var(--border-color); padding:16px; border-radius:var(--radius-md);">
                  <h4 style="margin-bottom:12px; color:#a78bfa;">AHEM 临时邮箱 (自建)</h4>
                  <div class="form-group">
                    <label>AHEM 基础 URL</label>
                    <input type="text" id="setAhemURL" placeholder="https://mail.jiuuij.de5.net">
                  </div>
                  <div class="form-group">
                    <label>允许域名 (留空自动获取)</label>
                    <input type="text" id="setAhemDomains" placeholder="jiuuij.de5.net,jiuuij.bond">
                  </div>
                </div>
                <div style="border: 1px solid var(--border-color); padding:16px; border-radius:var(--radius-md);">
                  <h4 style="margin-bottom:12px; color:var(--warning);">YYDS Mail</h4>
                  <div class="form-group">
                    <label>YYDS 基础 URL</label>
                    <input type="text" id="setYydsURL" placeholder="https://maliapi.215.im">
                  </div>
                  <div class="form-group">
                    <label>YYDS API Key</label>
                    <input type="password" id="setYydsKey" placeholder="AC-xxxxxx">
                  </div>
                </div>
              </div>
              <button class="btn btn-primary" onclick="saveMailSettings()">保存邮箱配置</button>
            </div>

            <!-- 代理设置 -->
            <div class="section-header" onclick="toggleSection('set-proxy')">
              <h3><span>🌐</span> 代理与网络配置</h3>
              <span class="arrow-icon">▶</span>
            </div>
            <div id="set-proxy" class="section-body">
              <div class="form-group">
                <label>默认代理 URL</label>
                <input type="text" id="setProxyDefault" placeholder="http://user:pass@host:port">
              </div>
              <div class="form-group">
                <label>代理池 (每行一个)</label>
                <textarea id="setProxyPool" placeholder="http://proxy1:port&#10;http://proxy2:port"></textarea>
              </div>
              <button class="btn btn-primary" onclick="saveProxySettings()">保存代理配置</button>
            </div>

            <!-- 账号管理 -->
            <div class="section-header" onclick="toggleSection('set-auth')">
              <h3><span>🔐</span> 登录凭据管理</h3>
              <span class="arrow-icon">▶</span>
            </div>
            <div id="set-auth" class="section-body">
              <div class="form-row">
                <div class="form-group">
                  <label>新用户名</label>
                  <input type="text" id="setNewUsername" placeholder="保留原用户名则留空">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>新密码</label>
                  <input type="password" id="setNewPassword" placeholder="输入新密码">
                </div>
                <div class="form-group">
                  <label>确认新密码</label>
                  <input type="password" id="setNewPassword2" placeholder="确认新密码">
                </div>
              </div>
              <p style="font-size:0.8rem; color:var(--error); margin-bottom:16px;">注意: 修改成功后系统会自动销毁当前会话，需要使用新用户名和密码重新登录。</p>
              <button class="btn btn-danger" onclick="saveAuthSettings()">更新登录凭据</button>
            </div>
          </div>

        </main>

        <!-- 4. 固定日志窗口 -->
        <div class="log-panel" id="logPanel">
          <div class="log-header" onclick="toggleLogWindow()">
            <span>📺 实时流日志</span>
            <div class="log-controls">
              <button class="btn btn-secondary btn-sm" onclick="clearLogs(event)">清空</button>
              <span id="logToggleArrow">▼</span>
            </div>
          </div>
          <div class="log-body" id="logBody">
            <!-- 实时日志输出 -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">凭据详情</h3>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">关闭</button>
      </div>
      <div class="modal-body">
        <pre id="modalContent"></pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-sm" onclick="copyModalContent()">复制完整数据</button>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- Core Javascript -->
  <script>
    let token = localStorage.getItem('token') || '';
    let results = [];
    try {
      results = JSON.parse(localStorage.getItem('results')) || [];
    } catch {
      results = [];
    }

    const regAbort = { grok: null, fireworks: null };

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      if (token) {
        checkAuth();
      } else {
        showLogin();
      }

      // 绑定回车登录
      document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    // Toast 通知
    function showToast(msg, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '✓' : '✗'}</span><span>${msg}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // API 通用请求
    async function apiRequest(method, path, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      try {
        const res = await fetch(path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : null
        });

        if (res.status === 401) {
          handleLogout();
          throw new Error('未授权，请重新登录');
        }

        return res;
      } catch (err) {
        showToast(err.message, 'error');
        throw err;
      }
    }

    // 登录 / 注销
    async function handleLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;

      if (!u || !p) {
        showToast('请输入用户名和密码', 'error');
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });

        const data = await res.json();
        if (!res.ok) {
          showToast(data.error || '登录失败', 'error');
          return;
        }

        token = data.token;
        localStorage.setItem('token', token);
        showApp(u);
        showToast('登录成功', 'success');
      } catch {
        showToast('连接登录接口失败', 'error');
      }
    }

    function handleLogout() {
      token = '';
      localStorage.removeItem('token');
      showLogin();
    }

    async function checkAuth() {
      try {
        const res = await apiRequest('GET', '/api/auth/me');
        if (res.ok) {
          const data = await res.json();
          showApp(data.username);
        } else {
          showLogin();
        }
      } catch {
        showLogin();
      }
    }

    function showLogin() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('appLayout').style.display = 'none';
    }

    function showApp(username) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('appLayout').style.display = 'flex';
      document.getElementById('displayUsername').textContent = username;
      updateStats();
      renderResults();
      loadSettings();
    }

    // 面板切换
    function switchPanel(panelId) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

      document.getElementById('panel-' + panelId).classList.add('active');
      document.querySelector(`.nav-link[data-panel="${panelId}"]`).classList.add('active');
    }

    // Tab 切换
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.style.display = 'none');

      document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
      document.getElementById('tab-' + tabId).style.display = 'block';
    }

    // 手风琴卡片切换
    function toggleSection(id) {
      const header = document.querySelector(`[onclick="toggleSection('${id}')"]`);
      const body = document.getElementById(id);
      
      const isVisible = body.classList.contains('show');
      
      document.querySelectorAll('.section-body').forEach(b => b.classList.remove('show'));
      document.querySelectorAll('.section-header').forEach(h => h.classList.remove('active'));

      if (!isVisible) {
        body.classList.add('show');
        header.classList.add('active');
      }
    }

    // 折叠日志窗口
    function toggleLogWindow() {
      const panel = document.getElementById('logPanel');
      const arrow = document.getElementById('logToggleArrow');
      panel.classList.toggle('collapsed');
      arrow.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
    }

    function clearLogs(e) {
      if (e) e.stopPropagation();
      document.getElementById('logBody').innerHTML = '';
    }

    // 写入日志
    function addLog(text) {
      const body = document.getElementById('logBody');
      const line = document.createElement('div');
      line.className = 'log-line';

      // 着色
      if (text.includes('[+]')) {
        line.classList.add('log-success');
      } else if (text.includes('[-]')) {
        line.classList.add('log-error');
      } else if (text.includes('[*]')) {
        line.classList.add('log-info');
      } else if (text.includes('[!]')) {
        line.classList.add('log-warn');
      } else if (text.includes('[OK]')) {
        line.classList.add('log-ok');
      }

      line.textContent = text;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
    }

    // 注册任务
    async function startRegistration(type) {
      const proxy = document.getElementById(type + 'Proxy').value.trim();
      const count = parseInt(document.getElementById(type + 'Count').value) || 1;
      const provider = document.getElementById(type + 'MailProvider').value;

      const startBtn = document.getElementById(`btn-${type}-start`);
      const stopBtn = document.getElementById(`btn-${type}-stop`);

      startBtn.disabled = true;
      startBtn.textContent = '运行中...';
      stopBtn.style.display = 'inline-flex';

      const panel = document.getElementById('logPanel');
      panel.classList.remove('collapsed');
      document.getElementById('logToggleArrow').textContent = '▼';

      addLog(`[*] 开启 ${type} 自动化任务，数量: ${count}`);

      let successCount = 0;
      let failCount = 0;

      const controller = new AbortController();
      regAbort[type] = controller;

      const bodyData = { count };
      if (proxy) bodyData.proxy = proxy;
      if (provider) bodyData.email_provider = provider;

      try {
        const res = await fetch(`/api/${type}/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(bodyData),
          signal: controller.signal
        });

        if (res.status === 401) {
          handleLogout();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let currentEvent = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith('data: ')) {
              const data = line.slice(6).trim();
              if (currentEvent === 'log') {
                addLog(data);
              } else if (currentEvent === 'result') {
                try {
                  const resultObj = JSON.parse(data);
                  
                  // 添加到结果缓存
                  const newResult = {
                    platform: type,
                    email: resultObj.email,
                    status: resultObj.ok ? 'success' : 'failed',
                    data: resultObj.data || resultObj,
                    time: new Date().toLocaleString()
                  };
                  results.unshift(newResult);
                  localStorage.setItem('results', JSON.stringify(results));
                  updateStats();
                  renderResults();

                  if (resultObj.ok) {
                    successCount++;
                  } else {
                    failCount++;
                  }
                } catch (err) {
                  addLog('[-] 解析注册结果 JSON 失败: ' + err.message);
                }
              }
            }
          }
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          addLog('[!] 任务已被手动停止');
        } else {
          addLog('[-] 异常退出: ' + err.message);
        }
      } finally {
        startBtn.disabled = false;
        startBtn.textContent = '开始批量注册';
        stopBtn.style.display = 'none';
        regAbort[type] = null;
        addLog(`[OK] 完成: ${successCount} 成功, ${failCount} 失败`);
        showToast(`任务已结束: ${successCount} 成功, ${failCount} 失败`);
      }
    }

    function stopRegistration(type) {
      if (regAbort[type]) {
        regAbort[type].abort();
      }
    }

    // 渲染结果表格
    function renderResults() {
      const filterPlat = document.getElementById('filterPlatform').value;
      const filterStat = document.getElementById('filterStatus')?.value || 'all';
      const searchText = document.getElementById('searchInput')?.value.toLowerCase() || '';
      
      let filteredList = results;
      
      // 平台筛选
      if (filterPlat !== 'all') {
        filteredList = filteredList.filter(r => r.platform === filterPlat);
      }
      
      // 状态筛选
      if (filterStat !== 'all') {
        filteredList = filteredList.filter(r => r.status === filterStat);
      }
      
      // 搜索过滤
      if (searchText) {
        filteredList = filteredList.filter(r => {
          const email = (r.email || '').toLowerCase();
          const password = (r.data?.password || '').toLowerCase();
          const key = (r.data?.apikey || r.data?.auth_token || '').toLowerCase();
          return email.includes(searchText) || password.includes(searchText) || key.includes(searchText);
        });
      }

      // 更新统计
      updateStats();
      
      const container = document.getElementById('resultsTableContainer');

      if (filteredList.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>暂无符合条件的数据</p></div>';
        return;
      }

      let html = `
        <table class="table">
          <thead>
            <tr>
              <th>平台</th>
              <th>邮箱</th>
              <th>密码</th>
              <th>凭据 (Key/Token)</th>
              <th>状态</th>
              <th>时间</th>
              <th style="text-align:right;">操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      filteredList.forEach((r, i) => {
        const badgePlat = r.platform === 'grok' ? 'badge-grok' : 'badge-fireworks';
        const badgeStatus = r.status === 'success' ? 'badge-success' : 'badge-failed';
        
        const password = r.data?.password || '-';
        let credential = '';
        if (r.data) {
          if (r.platform === 'fireworks') {
            credential = r.data.apikey || '-';
          } else {
            credential = r.data.auth_token || '-';
          }
        }

        const rawIndex = results.indexOf(r);

        html += `
          <tr>
            <td><span class="badge ${badgePlat}">${r.platform}</span></td>
            <td class="cell-email">${esc(r.email)}</td>
            <td class="cell-cred">${esc(password)}</td>
            <td class="cell-cred">${esc(credential)}</td>
            <td><span class="badge ${badgeStatus}">${r.status === 'success' ? '成功' : '失败'}</span></td>
            <td style="font-size:0.75rem; color:var(--text-muted); white-space:nowrap;">${r.time}</td>
            <td style="text-align:right; white-space:nowrap;">
              <button class="btn btn-secondary btn-sm" onclick="copyFormatted(${rawIndex})">复制</button>
              <button class="btn btn-secondary btn-sm" onclick="viewCreds(${rawIndex})">详情</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function updateStats() {
      const total = results.length;
      const success = results.filter(r => r.status === 'success').length;
      const failed = total - success;
      const rate = total > 0 ? Math.round((success / total) * 100) : 0;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-success').textContent = success;
      document.getElementById('stat-failed').textContent = failed;
      document.getElementById('stat-rate').textContent = rate + '%';
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function copyCreds(idx, btn) {
      const r = results[idx];
      let str = '';
      if (r.data) {
        // 如果是 fireworks 优先提取 key，如果是 grok 优先提取 sso token
        if (r.platform === 'fireworks') {
          str = r.data.apikey || JSON.stringify(r.data, null, 2);
        } else {
          str = r.data.auth_token || JSON.stringify(r.data, null, 2);
        }
      } else {
        str = JSON.stringify(r, null, 2);
      }

      navigator.clipboard.writeText(str).then(() => {
        btn.textContent = '已复制 ✓';
        btn.style.color = 'var(--success)';
        setTimeout(() => {
          btn.textContent = '复制';
          btn.style.color = '';
        }, 1500);
      });
    }

    function copyFormatted(idx) {
      const r = results[idx];
      if (!r.data || r.status !== 'success') {
        showToast('无有效凭据可复制', 'error');
        return;
      }
      
      let line = '';
      if (r.platform === 'fireworks') {
        line = `${r.email}----${r.data.password || ''}----${r.data.apikey || ''}`;
      } else {
        line = `${r.email}----${r.data.password || ''}----${r.data.auth_token || ''}`;
      }
      
      navigator.clipboard.writeText(line).then(() => {
        showToast('已复制格式化文本', 'success');
      });
    }

    function copyAllFormatted() {
      const successList = results.filter(r => r.status === 'success');
      if (successList.length === 0) {
        showToast('无成功账号可复制', 'error');
        return;
      }
      
      let text = '';
      successList.forEach(r => {
        if (r.platform === 'fireworks') {
          text += `${r.email}----${r.data.password || ''}----${r.data.apikey || ''}\n`;
        } else {
          text += `${r.email}----${r.data.password || ''}----${r.data.auth_token || ''}\n`;
        }
      });
      
      navigator.clipboard.writeText(text).then(() => {
        showToast(`已复制 ${successList.length} 条记录`, 'success');
      });
    }

    function viewCreds(idx) {
      const r = results[idx];
      document.getElementById('modalTitle').textContent = `${r.platform.toUpperCase()} - ${r.email}`;
      document.getElementById('modalContent').textContent = JSON.stringify(r.data || r, null, 2);
      document.getElementById('detailModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    function copyModalContent() {
      const text = document.getElementById('modalContent').textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板', 'success');
      });
    }

    function exportResults() {
      if (results.length === 0) {
        showToast('暂无数据可以导出', 'error');
        return;
      }
      const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `reg_results_${Date.now()}.json`;
      a.click();
    }

    function exportResultsTxt() {
      if (results.length === 0) {
        showToast('暂无数据可以导出', 'error');
        return;
      }
      
      let text = '';
      results.forEach(r => {
        if (r.status !== 'success') return;
        if (r.platform === 'fireworks') {
          text += `${r.email}----${r.data.password || ''}----${r.data.apikey || ''}\n`;
        } else if (r.platform === 'grok') {
          text += `${r.email}----${r.data.password || ''}----${r.data.auth_token || ''}\n`;
        }
      });

      if (!text) {
        showToast('无成功账号凭据可供导出', 'error');
        return;
      }

      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `reg_keys_${Date.now()}.txt`;
      a.click();
    }

    function clearResults() {
      if (results.length === 0) return;
      if (!confirm('确定要清空所有注册结果历史吗？此操作不可撤销。')) return;
      results = [];
      localStorage.setItem('results', '[]');
      updateStats();
      renderResults();
      showToast('历史结果已清空', 'success');
    }

    // === Settings ===
    async function loadSettings() {
      try {
        const [resMail, resProxy] = await Promise.all([
          apiRequest('GET', '/api/settings/mail'),
          apiRequest('GET', '/api/settings/proxy')
        ]);

        if (resMail.ok) {
          const mail = await resMail.json();
          document.getElementById('setMailPriority').value = mail.provider_priority || '';
          document.getElementById('setAhemURL').value = mail.ahem?.base_url || '';
          document.getElementById('setAhemDomains').value = mail.ahem?.domains || '';
          document.getElementById('setYydsURL').value = mail.yydsmail?.base_url || '';
          document.getElementById('setYydsKey').value = mail.yydsmail?.api_key || '';
        }

        if (resProxy.ok) {
          const proxy = await resProxy.json();
          document.getElementById('setProxyDefault').value = proxy.default || '';
          document.getElementById('setProxyPool').value = (proxy.pool || []).join('\n');
        }
      } catch (err) {
        console.error('加载系统设置失败:', err);
      }
    }

    async function saveMailSettings() {
      const body = {
        provider_priority: document.getElementById('setMailPriority').value.trim(),
        ahem: {
          base_url: document.getElementById('setAhemURL').value.trim(),
          domains: document.getElementById('setAhemDomains').value.trim()
        },
        yydsmail: {
          base_url: document.getElementById('setYydsURL').value.trim(),
          api_key: document.getElementById('setYydsKey').value
        }
      };

      try {
        const res = await apiRequest('POST', '/api/settings/mail', body);
        if (res.ok) {
          showToast('邮箱配置已保存并生效', 'success');
          loadSettings(); // 重新加载打码遮罩后的 key
        }
      } catch {}
    }

    async function saveProxySettings() {
      const poolText = document.getElementById('setProxyPool').value;
      const pool = poolText.split('\n').map(s => s.trim()).filter(Boolean);

      const body = {
        default: document.getElementById('setProxyDefault').value.trim(),
        pool: pool
      };

      try {
        const res = await apiRequest('POST', '/api/settings/proxy', body);
        if (res.ok) {
          showToast('代理配置已保存并生效', 'success');
        }
      } catch {}
    }

    async function saveAuthSettings() {
      const newU = document.getElementById('setNewUsername').value.trim();
      const newP = document.getElementById('setNewPassword').value;
      const newP2 = document.getElementById('setNewPassword2').value;

      if (!newU && !newP) {
        showToast('请填写要修改的用户名或密码', 'error');
        return;
      }

      if (newP && newP !== newP2) {
        showToast('两次输入的新密码不一致', 'error');
        return;
      }

      if (newP && newP.length < 6) {
        showToast('新密码长度至少为 6 位', 'error');
        return;
      }

      if (!confirm('修改账户信息后需要使用新凭据重新登录，确定继续吗？')) return;

      const body = {};
      if (newU) body.new_username = newU;
      if (newP) body.new_password = newP;

      try {
        const res = await apiRequest('POST', '/api/auth/credentials', body);
        const data = await res.json();
        if (data.logout) {
          alert('账户信息已更新，请使用新凭据重新登录');
          handleLogout();
        } else if (data.error) {
          showToast(data.error, 'error');
        }
      } catch {}
    }
  </script>
</body>
</html>
